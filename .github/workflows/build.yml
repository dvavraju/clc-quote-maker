name: Flutter Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'
          cache: true

      # Generate a fresh keystore for signing
      - name: Generate release keystore
        run: |
          keytool -genkey -v \
            -keystore clc-release-key.jks \
            -alias clc \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass clcquotemaker \
            -keypass clcquotemaker \
            -dname "CN=CLC Quote Maker, OU=CLC, O=The Story Book by CLC, L=Visakhapatnam, S=AP, C=IN" \
            -noprompt

      # Scaffold a clean Flutter project
      - name: Scaffold clean Flutter project
        run: |
          flutter create \
            --org com.thestorybookbyclc \
            --project-name quotmaker \
            --platforms android \
            --no-pub \
            flutter_build

      # Overlay our app source code
      - name: Overlay app source code
        run: |
          rm -rf flutter_build/lib
          cp -r lib        flutter_build/lib
          cp -r assets     flutter_build/assets
          cp pubspec.yaml  flutter_build/pubspec.yaml

          # Overlay our custom CLC logo icons
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            src="android/app/src/main/res/$density"
            dst="flutter_build/android/app/src/main/res/$density"
            if [ -d "$src" ]; then
              cp -f "$src"/*.png "$dst"/
            fi
          done

      # Set up release signing in local.properties
      - name: Configure release signing
        working-directory: flutter_build
        run: |
          echo "storeFile=$GITHUB_WORKSPACE/clc-release-key.jks" >> android/local.properties
          echo "storePassword=clcquotemaker"                      >> android/local.properties
          echo "keyAlias=clc"                                     >> android/local.properties
          echo "keyPassword=clcquotemaker"                        >> android/local.properties

      # Patch android/app/build.gradle to use the release keystore
      - name: Patch build.gradle for release signing
        working-directory: flutter_build/android/app
        run: |
          cat > signing_patch.gradle << 'EOF'
          android {
              signingConfigs {
                  release {
                      def keystoreProps = new Properties()
                      def propsFile = rootProject.file('../local.properties')
                      if (propsFile.exists()) { propsFile.withInputStream { keystoreProps.load(it) } }
                      storeFile file(keystoreProps['storeFile'])
                      storePassword keystoreProps['storePassword']
                      keyAlias keystoreProps['keyAlias']
                      keyPassword keystoreProps['keyPassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          echo "" >> build.gradle
          echo "apply from: 'signing_patch.gradle'" >> build.gradle

      - name: Install dependencies
        working-directory: flutter_build
        run: flutter pub get

      - name: Build Release APK
        working-directory: flutter_build
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK for easy identification
        run: |
          mkdir -p apk_output
          cp flutter_build/build/app/outputs/flutter-apk/app-release.apk \
             apk_output/CLC-Quote-Maker.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CLC-Quote-Maker-APK
          path: apk_output/CLC-Quote-Maker.apk
