name: Flutter Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.4'
          cache: true

      # Let Flutter generate a perfectly-structured Android project
      - name: Scaffold clean Flutter project
        run: |
          flutter create \
            --org com.thestorybookbyclc \
            --project-name quotmaker \
            --platforms android \
            --no-pub \
            flutter_build

      # Overlay our app's source code on top of the scaffold
      - name: Overlay app source code
        run: |
          rm -rf flutter_build/lib
          cp -r lib        flutter_build/lib
          cp -r assets     flutter_build/assets
          cp pubspec.yaml  flutter_build/pubspec.yaml

          # Overlay our custom CLC logo icons into every density folder
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            src="android/app/src/main/res/$density"
            dst="flutter_build/android/app/src/main/res/$density"
            if [ -d "$src" ]; then
              cp -f "$src"/*.png "$dst"/
            fi
          done

      - name: Install dependencies
        working-directory: flutter_build
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_build
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CLC-Quote-Maker
          path: flutter_build/build/app/outputs/flutter-apk/app-release.apk
